name: Test and Deploy to Cloud Run

on:
  push:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      # Step 4: Run tests
      - name: Run Pytest
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          pytest -v

      # Step 5: Authenticate with Google Cloud
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key_json: ${{ secrets.GCP_SA_KEY }}
      
      - name: Authenticate gcloud
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > ${HOME}/gcp-key.json
          gcloud auth activate-service-account --key-file=${HOME}/gcp-key.json
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      # Step 6: Build and Deploy to Cloud Run
      - name: Build and Deploy
        run: |
          gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/msme-score
          gcloud run deploy msme-score \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/msme-score \
            --region asia-south1 \
            --platform managed \
            --allow-unauthenticated
